server.port=8090

spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

spring.cloud.gateway.server.webmvc.routes[0].id=audit-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AUDIT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/audits/**

spring.cloud.gateway.server.webmvc.routes[1].id=compliance-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://COMPLIANCE-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/compliance/**

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
