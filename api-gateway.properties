server.port=9191
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# Routes for Employee Service
spring.cloud.gateway.server.webmvc.routes[0].id=Employee-Service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://Employee-Service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/employees/**
# Routes for Department Service
spring.cloud.gateway.server.webmvc.routes[1].id=Department-Service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://Department-Service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/dept/**
